spring.application.name=api-gateway
server.port=8765

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# Omogući rutiranje preko imena servisa iz Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.discovery.locator.filters[0].name=StripPrefix
spring.cloud.gateway.discovery.locator.filters[0].args.parts=1

# Internal service-to-service API key (used by web-app Feign clients)
gateway.security.api-key=gateway-api-key

# JWT secret – must match user-service
jwt.secret=cafe-shop-secret-key-must-be-32bytes!
