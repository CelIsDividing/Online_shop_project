<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje porudžbine</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
        header {
            background: #0f3460; color: white;
            padding: 16px 32px;
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 1.4rem; letter-spacing: 1px; }
        .logout-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.45);
            color: white; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.15); }
        .container { max-width: 920px; margin: 40px auto; padding: 0 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h2 { color: #1e3a5f; font-size: 1.6rem; }
        .btn-new {
            background: #2563eb; color: white; border: none;
            padding: 10px 22px; border-radius: 8px; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; text-decoration: none;
        }
        .btn-new:hover { background: #1d4ed8; }
        .alert { padding: 12px 18px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .empty-msg { text-align: center; color: #94a3b8; padding: 60px 20px; font-size: 1.05rem; }
        .order-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            margin-bottom: 18px; overflow: hidden;
        }
        .order-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 22px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0;
        }
        .order-id { font-weight: 600; color: #1e3a5f; font-size: 1rem; }
        .order-date { color: #94a3b8; font-size: 0.82rem; margin-top: 2px; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
        .badge-draft { background: #fef9c3; color: #854d0e; }
        .badge-paid  { background: #dcfce7; color: #166534; }
        .order-body { padding: 14px 22px; }
        .item-row {
            display: flex; justify-content: space-between;
            padding: 6px 0; font-size: 0.9rem; color: #475569;
            border-bottom: 1px solid #f1f5f9;
        }
        .item-row:last-child { border-bottom: none; }
        .extra-row {
            display: flex; justify-content: space-between;
            padding: 4px 0 4px 16px; font-size: 0.83rem; color: #94a3b8;
        }
        .order-footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 22px; background: #f1f5f9; border-top: 1px solid #e2e8f0;
        }
        .total { font-weight: 700; color: #1e3a5f; font-size: 1rem; }
        .actions { display: flex; gap: 10px; }
        .btn { padding: 8px 18px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
        .btn-continue { background: #2563eb; color: white; }
        .btn-continue:hover { background: #1d4ed8; }
        .btn-pay { background: #dc2626; color: white; }
        .btn-pay:hover { background: #b91c1c; }
        .btn-view { background: #64748b; color: white; }
        .btn-view:hover { background: #475569; }
        .empty-items { color: #cbd5e1; font-size: 0.88rem; font-style: italic; }
        .item-meta { font-size: 0.75rem; color: #94a3b8; margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .allergen-tag { background: #fee2e2; color: #991b1b; padding: 1px 7px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
        .calorie-tag { color: #64748b; font-size: 0.72rem; }
        /* Loyalty banner */
        .loyalty-banner {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 1px solid #bfdbfe; border-radius: 12px;
            padding: 16px 22px; margin-bottom: 24px;
            display: flex; align-items: center; gap: 16px;
        }
        .loyalty-banner .medal { font-size: 2rem; }
        .loyalty-banner .tier { font-weight: 700; color: #1e40af; font-size: 1rem; }
        .loyalty-banner .detail { font-size: 0.85rem; color: #3b82f6; margin-top: 3px; }
    </style>
</head>
<body>
<header>
    <h1>☕ Cafe Shop</h1>
    <div style="display:flex;align-items:center;gap:16px;">
        <span th:text="'Zdravo, ' + ${userName}">Zdravo</span>
        <a th:href="@{/notifications}"
           style="position:relative;color:white;text-decoration:none;font-size:1.1rem;padding:4px 8px;">
            🔔
            <span th:if="${unreadNotifCount > 0}"
                  th:text="${unreadNotifCount}"
                  style="position:absolute;top:-4px;right:-6px;background:#ef4444;color:white;border-radius:50%;font-size:.65rem;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-weight:700;"></span>
        </a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Odjavi se</button>
        </form>
    </div>
</header>

<div class="container">
    <div class="page-header">
        <h2>Moje porudžbine</h2>
        <div style="display:flex;gap:10px;">
            <a href="/cards" style="background:#475569;color:white;border:none;padding:10px 18px;border-radius:8px;font-size:0.92rem;font-weight:600;cursor:pointer;text-decoration:none;">💳 Kartice</a>
            <form th:action="@{/orders/draft}" method="post">
                <button type="submit" class="btn-new">+ Nova porudžbina</button>
            </form>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <!-- Loyalty status panel -->
    <div th:if="${loyalty != null}" class="loyalty-banner">
        <div class="medal">🏅</div>
        <div>
            <div class="tier" th:text="${loyalty.tierName} + ' nivo'">BRONZE nivo</div>
            <div class="detail">
                Poeni: <strong th:text="${loyalty.points}">0</strong> &nbsp;|&nbsp;
                Popust: <strong th:text="${#numbers.formatDecimal(loyalty.discountPercent, 1, 2)} + ' %'">0 %</strong>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="empty-msg">
        Nema porudžbina. Kreirajte novu klikom na "+ Nova porudžbina".
    </div>

    <div th:each="order : ${orders}" class="order-card">
        <div class="order-header">
            <div>
                <div class="order-id" th:text="'Porudžbina #' + ${order.id}">Porudžbina</div>
                <div class="order-date" th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">datum</div>
            </div>
            <span class="badge"
                  th:classappend="${order.draft} ? 'badge-draft' : 'badge-paid'"
                  th:text="${order.draft} ? 'U toku' : 'Plaćeno'">Status</span>
        </div>

        <div class="order-body">
            <div th:if="${order.items == null or #lists.isEmpty(order.items)}" class="empty-items">
                (nema stavki)
            </div>
            <div th:each="item : ${order.items}">
                <div class="item-row">
                    <div>
                        <div th:text="${item.productName}">Proizvod</div>
                        <!-- kalorije i alergeni za proizvod -->
                        <div th:if="${productMap != null and productMap[item.productId] != null}" class="item-meta">
                            <span th:if="${productMap[item.productId].calories != null}" class="calorie-tag"
                                  th:text="${productMap[item.productId].calories} + ' kcal'"></span>
                            <span th:each="a : ${productMap[item.productId].allergens}" class="allergen-tag" th:text="${a.name}"></span>
                        </div>
                        <!-- extras -->
                        <div th:each="extra : ${item.extras}" style="padding: 2px 0 2px 12px;">
                            <div class="extra-row" style="padding:0;">
                                <span th:text="'+ ' + ${extra.extraName}">Extra</span>
                                <span th:text="${#numbers.formatDecimal(extra.price, 1, 2)} + ' RSD'" style="margin-left:8px;"></span>
                            </div>
                            <div th:if="${extraMap != null and extraMap[extra.extraId] != null}" class="item-meta" style="padding-left:0;">
                                <span th:if="${extraMap[extra.extraId].calories != null}" class="calorie-tag"
                                      th:text="${extraMap[extra.extraId].calories} + ' kcal'"></span>
                                <span th:each="a : ${extraMap[extra.extraId].allergens}" class="allergen-tag" th:text="${a.name}"></span>
                            </div>
                        </div>
                    </div>
                    <span style="font-weight:600;color:#1e3a5f;white-space:nowrap;margin-left:10px;"
                          th:text="${#numbers.formatDecimal(item.price, 1, 2)} + ' RSD'">0 RSD</span>
                </div>
            </div>
        </div>

        <div class="order-footer">
            <span class="total"
                  th:text="'Ukupno: ' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)} + ' RSD'">Ukupno</span>
            <div class="actions">
                <a th:if="${order.draft}" th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-continue">Nastavi</a>
                <a th:if="${order.draft}" th:href="@{/orders/{id}/pay(id=${order.id})}" class="btn btn-pay">Plati</a>
                <a th:if="${order.paid}"  th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-view">Pogledaj</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
