<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Prijava – Cafe Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand .logo { font-size: 2.5rem; }
        .brand h1 { font-size: 1.6rem; margin-top: 0.4rem; }
        .login-form input[type=text],
        .login-form input[type=email],
        .login-form input[type=password] {
            display: block; width: 100%;
            padding: 0.65rem 0.9rem;
            font-size: 1rem;
            border: 1px solid #334;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: #eee;
            margin-bottom: 0.75rem;
        }
        .login-form input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
        .login-form label { margin-bottom: 0.3rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <div class="logo">☕</div>
            <h1>Cafe Shop</h1>
            <p class="subtitle">Prijavite se na sistem</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/login}" method="post" class="login-form">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="npr. ana.jovanovic@example.com" autocomplete="email"/>
            <label for="password">Šifra</label>
            <input type="password" id="password" name="password" required autocomplete="current-password"/>
            <button type="submit">Prijavi se</button>
        </form>
    </div>
</body>
</html>
